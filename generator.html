                <h2>Configuration</h2>
                <form>
                    <label for="containerId">containerId</label>

                    <label for="svgId">svgId</label>
                    <input id="svgId" name="svgId" type="text" placeholder="loader" />

                    <label for="radius">radius</label>

                    <label for="duration">duration</label>

                    <label for="maxOpacity">maxOpacity</label>
                    <input id="maxOpacity" name="maxOpacity" type="range" min="0" max="1" step="0.01">
                    <span class="badge">0.75</span>

                    <label for="margin">margin</label>
                    <input id="margin" name="margin" type="number" min="0">

                    <label for="nbRects">nbRects</label>
                    <input id="nbRects" name="nbRects" type="number" min="1">

                    <label for="fill">fill</label>

                    <div class="buttons">
                        <button type="reset">Reset</button>
                    </div>
                </form>
            </div>
